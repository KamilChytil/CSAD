<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1A1A1A" />
    <meta name="description" content="Va-bank — jediná banka na kterou můžete vsadit. Tvůj život, tvé finance, tvá hra." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Va-bank" />
    <title>Va-bank – jediná banka na kterou můžete vsadit</title>
    <base href="/" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Styles -->
    <link href="_content/FairBank.Web.Shared/css/vabank-theme.css?v=3" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />

    <!-- Theme init (before paint to prevent flash) -->
    <script>
        (function() {
            var t = localStorage.getItem('vb-theme');
            if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>

<body>
    <div id="app">
        <div class="loading-screen">
            <div class="loading-chip">
                <div class="chip-spin"></div>
            </div>
            <p style="font-size: 20px; font-weight: 800; letter-spacing: 3px; margin-bottom: -16px;">VA-BANK</p>
            <p style="font-size: 11px; color: #888; letter-spacing: 1px;">TVŮJ ŽIVOT · TVÉ FINANCE · TVÁ HRA</p>
        </div>
    </div>

    <div id="blazor-error-ui">
        Došlo k chybě. <a href="" class="reload">Načíst znovu</a>
    </div>

    <script src="js/vabank-interop.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>

</html>
