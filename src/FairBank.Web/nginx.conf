server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API reverse-proxy → internal API gateway ────────────
    location /api/ {
        proxy_pass         http://api-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        keep-alive;
        proxy_buffering    off;
        proxy_read_timeout 120s;
    }

    # ── Health endpoints proxied through ─────────────────────
    location /identity/health {
        proxy_pass http://api-gateway:8080;
    }

    location /accounts/health {
        proxy_pass http://api-gateway:8080;
    }

    # ── Blazor WASM — SPA fallback ──────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proper MIME types for .NET WASM assemblies ───────────
    types {
        application/wasm                wasm;
        application/octet-stream        dll dat;
        application/json                json;
        text/javascript                 js;
        text/css                        css;
        text/html                       html htm;
        image/svg+xml                   svg;
        image/png                       png;
        image/x-icon                    ico;
        font/woff2                      woff2;
        font/woff                       woff;
    }

    # ── Compression ──────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/wasm;
    gzip_min_length 256;

    # ── Caching for static assets ────────────────────────────
    location ~* \.(dll|wasm|dat|blat)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }
}
