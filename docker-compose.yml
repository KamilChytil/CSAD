services:

  # ─── Web App (Blazor WASM) — ONLY EXPOSED SERVICE ────────
  web-app:
    build:
      context: .
      dockerfile: src/FairBank.Web/Dockerfile
    container_name: fairbank-web
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - frontend

  # ─── Admin Web App (Standalone Logging UI) ────────
  admin-web-app:
    build:
      context: .
      dockerfile: src/FairBank.Admin.Web/Dockerfile
    container_name: fairbank-admin-web
    ports:
      - "8081:8080"
    depends_on:
      - kafka
    networks:
      - backend

  # ─── API Gateway (bridges frontend ↔ backend) ───────────
  api-gateway:
    build:
      context: .
      dockerfile: src/FairBank.ApiGateway/Dockerfile
    container_name: fairbank-api-gateway
    expose:
      - "8080"
    depends_on:
      - identity-api
      - accounts-api
      - payments-api
    networks:
      - frontend
      - backend

  identity-api:
    build:
      context: .
      dockerfile: src/Services/Identity/FairBank.Identity.Api/Dockerfile
    container_name: fairbank-identity-api
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres-primary;Port=5432;Database=fairbank;Username=fairbank_app;Password=fairbank_app_2026;Search Path=identity_service"
    depends_on:
      postgres-primary:
        condition: service_healthy
    networks:
      - backend

  accounts-api:
    build:
      context: .
      dockerfile: src/Services/Accounts/FairBank.Accounts.Api/Dockerfile
    container_name: fairbank-accounts-api
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres-primary;Port=5432;Database=fairbank;Username=fairbank_app;Password=fairbank_app_2026;Search Path=accounts_service"
    depends_on:
      postgres-primary:
        condition: service_healthy
    networks:
      - backend

  # ─── Kafka ──────────────────────────────────────────────
  kafka:
    image: apache/kafka:latest
    container_name: fairbank-kafka
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    networks:
      - backend

  payments-api:
    build:
      context: .
      dockerfile: src/Services/Payments/FairBank.Payments.Api/Dockerfile
    container_name: fairbank-payments-api
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres-primary;Port=5432;Database=fairbank;Username=fairbank_app;Password=fairbank_app_2026;Search Path=payments_service"
      Services__AccountsApi: "http://accounts-api:8080"
    depends_on:
      postgres-primary:
        condition: service_healthy
      accounts-api:
        condition: service_started
    networks:
      - backend

  # ─── PostgreSQL Primary ──────────────────────────────────
  postgres-primary:
    image: postgres:16-alpine
    container_name: fairbank-pg-primary
    environment:
      POSTGRES_DB: fairbank
      POSTGRES_USER: fairbank_admin
      POSTGRES_PASSWORD: fairbank_secret_2026
      POSTGRES_INITDB_ARGS: "--data-checksums"
    expose:
      - "5432"
    volumes:
      - pgdata-primary:/var/lib/postgresql/data
      - ./docker/postgres/primary-init.sh:/docker-entrypoint-initdb.d/00-primary.sh:ro
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command: >
      postgres
        -c wal_level=replica
        -c max_wal_senders=3
        -c wal_keep_size=64MB
        -c hot_standby=on
        -c shared_buffers=128MB
        -c effective_cache_size=384MB
        -c work_mem=8MB
        -c log_statement=all
        -c log_connections=on
        -c log_disconnections=on
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U fairbank_admin -d fairbank" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ─── PostgreSQL Replica ──────────────────────────────────
  postgres-replica:
    image: postgres:16-alpine
    container_name: fairbank-pg-replica
    environment:
      POSTGRES_USER: fairbank_admin
      POSTGRES_PASSWORD: fairbank_secret_2026
    expose:
      - "5432"
    volumes:
      - pgdata-replica:/var/lib/postgresql/data
      - ./docker/postgres/replica-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: /entrypoint.sh
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U fairbank_admin -d fairbank" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  pgdata-primary:
  pgdata-replica:
